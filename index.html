<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/images/chakra.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anandam Yoga</title>

    <style>
      /* ── Loader overlay ───────────────────────────── */
      #yoga-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #faf5ff;
        transition: opacity 0.7s ease, visibility 0.7s ease;
      }
      #yoga-loader.hidden {
        opacity: 0;
        visibility: hidden;
      }

      /* ── Spiral rings container ───────────────────── */
      .spiral-wrap {
        position: relative;
        width: 110px;
        height: 110px;
        margin-bottom: 28px;
      }

      /* Each ring shares base styles */
      .ring {
        position: absolute;
        inset: 0;
        margin: auto;
        border-radius: 50%;
        border: 3px solid transparent;
        animation: spin linear infinite;
      }

      /* Outer ring — slow, indigo */
      .ring-1 {
        width: 110px;
        height: 110px;
        border-top-color: #4f46e5;
        border-right-color: #4f46e520;
        border-bottom-color: #4f46e540;
        border-left-color: #4f46e510;
        animation-duration: 2.4s;
      }

      /* Middle ring — medium, violet, reverse */
      .ring-2 {
        width: 80px;
        height: 80px;
        border-top-color: #7c3aed;
        border-right-color: #7c3aed30;
        border-bottom-color: #7c3aed60;
        border-left-color: #7c3aed15;
        animation-duration: 1.8s;
        animation-direction: reverse;
      }

      /* Inner ring — fast, pink */
      .ring-3 {
        width: 52px;
        height: 52px;
        border-top-color: #db2777;
        border-right-color: #db277720;
        border-bottom-color: #db277750;
        border-left-color: #db277710;
        animation-duration: 1.2s;
      }

      /* Centre lotus dot — pulses */
      .lotus-dot {
        position: absolute;
        inset: 0;
        margin: auto;
        width: 18px;
        height: 18px;
        background: radial-gradient(circle, #7c3aed, #4f46e5);
        border-radius: 50%;
        animation: pulse 1.6s ease-in-out infinite;
      }

      /* Petal petals around the dot */
      .petals {
        position: absolute;
        inset: 0;
        margin: auto;
        width: 34px;
        height: 34px;
        animation: spin 4s linear infinite reverse;
      }
      .petal {
        position: absolute;
        width: 8px;
        height: 14px;
        background: linear-gradient(180deg, #a78bfa, #7c3aed40);
        border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
        left: 50%;
        top: 50%;
        transform-origin: 50% 100%;
        opacity: 0.85;
      }
      /* 6 petals evenly spaced */
      .petal:nth-child(1) { transform: translateX(-50%) rotate(0deg)   translateY(-100%); }
      .petal:nth-child(2) { transform: translateX(-50%) rotate(60deg)  translateY(-100%); }
      .petal:nth-child(3) { transform: translateX(-50%) rotate(120deg) translateY(-100%); }
      .petal:nth-child(4) { transform: translateX(-50%) rotate(180deg) translateY(-100%); }
      .petal:nth-child(5) { transform: translateX(-50%) rotate(240deg) translateY(-100%); }
      .petal:nth-child(6) { transform: translateX(-50%) rotate(300deg) translateY(-100%); }

      /* ── Text below ───────────────────────────────── */
      .loader-title {
        font-family: Georgia, 'Times New Roman', serif;
        font-size: 20px;
        font-weight: 700;
        color: #4f46e5;
        letter-spacing: 1px;
        margin: 0 0 6px 0;
        animation: fadeUpIn 0.8s ease both;
      }
      .loader-sub {
        font-family: 'Segoe UI', Arial, sans-serif;
        font-size: 12px;
        color: #9ca3af;
        letter-spacing: 3px;
        text-transform: uppercase;
        margin: 0;
        animation: fadeUpIn 0.8s 0.2s ease both;
      }

      /* ── Dots progress ────────────────────────────── */
      .loader-dots {
        display: flex;
        gap: 6px;
        margin-top: 20px;
      }
      .loader-dots span {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #c4b5fd;
        animation: dotBounce 1.2s ease-in-out infinite;
      }
      .loader-dots span:nth-child(2) { animation-delay: 0.2s; }
      .loader-dots span:nth-child(3) { animation-delay: 0.4s; }

      /* ── Keyframes ────────────────────────────────── */
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1);   opacity: 1; }
        50%       { transform: scale(1.3); opacity: 0.7; }
      }
      @keyframes dotBounce {
        0%, 80%, 100% { transform: scale(1);   opacity: 0.5; }
        40%           { transform: scale(1.5); opacity: 1; }
      }
      @keyframes fadeUpIn {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>

  <body>
    <!-- ── Loader (visible before React hydrates) ── -->
    <div id="yoga-loader">
      <div class="spiral-wrap">
        <!-- Three spinning rings -->
        <div class="ring ring-1"></div>
        <div class="ring ring-2"></div>
        <div class="ring ring-3"></div>
        <!-- Rotating petals -->
        <div class="petals">
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
        </div>
        <!-- Pulsing centre dot -->
        <div class="lotus-dot"></div>
      </div>

      <p class="loader-title">🪷 Anandam Yoga</p>
      <p class="loader-sub">Loading your practice</p>
      <div class="loader-dots">
        <span></span><span></span><span></span>
      </div>
    </div>

    <!-- ── React root ── -->
    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>

    <script>
      // Hide loader once the page (and React) has fully loaded
      window.addEventListener('load', function () {
        var loader = document.getElementById('yoga-loader');
        if (loader) {
          // Small extra delay so the first paint of the app is ready
          setTimeout(function () {
            loader.classList.add('hidden');
            // Remove from DOM after fade-out transition
            setTimeout(function () {
              loader.remove();
            }, 750);
          }, 400);
        }
      });
    </script>
  </body>
</html>
